<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Create Account — Study Hall</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>!function(){var t=localStorage.getItem('studyhall-theme')||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}()</script>
</head>
<body>
  <div class="geo-bg" aria-hidden="true">
    <div class="geo geo-a"></div>
    <div class="geo geo-b"></div>
    <div class="geo geo-c"></div>
    <div class="geo geo-d"></div>
    <div class="geo geo-e"></div>
  </div>

  <div class="container auth-container">
    <header style="animation-delay: 0s">
      <a href="{{ url_for('index') }}" class="brand-link">
        <h1>Study <span class="accent">Hall</span></h1>
      </a>
      <p>Create a free account to get started</p>
    </header>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="card" style="animation-delay: 0.1s">
      <h2>Create account</h2>

      <a href="{{ url_for('auth.google_login') }}" class="btn-google">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </a>

      <div class="auth-divider"><span>or</span></div>

      <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
          <label for="name">Name <span class="field-optional">(optional)</span></label>
          <input type="text" name="name" id="name" autocomplete="name" maxlength="120">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" id="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="field-optional">(min 8 characters)</span></label>
          <input type="password" name="password" id="password"
                 autocomplete="new-password" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" name="confirm_password" id="confirm_password"
                 autocomplete="new-password" minlength="8" required>
        </div>

        <div class="actions">
          <button type="submit" class="btn">Create Account</button>
        </div>
      </form>
    </div>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        e.preventDefault();
        alert('Passwords do not match.');
      }
    });
  </script>
</body>
</html>
